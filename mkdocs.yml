site_name: Nifty 50 Tracker
site_description: Real-time NSE & Nifty 50 market tracker built with Streamlit and Python
site_author: Jyotheeswar Reddy
site_url: https://jyotheeswar012-max.github.io/nifty50-stock-tracker/

repo_name: jyotheeswar012-max/nifty50-stock-tracker
repo_url: https://github.com/jyotheeswar012-max/nifty50-stock-tracker
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
  - Methodology: methodology.md
  - API Reference:
    - Data Functions: api/data.md
    - Calculation Functions: api/calculations.md
    - Chart Functions: api/charts.md
  - Testing: testing.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jyotheeswar012-max
  analytics:
    provider: google
    property: G-XXXXXXXXXX
