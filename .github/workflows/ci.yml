name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install runtime deps + test/lint deps separately
      # requirements-test.txt contains pytest, pytest-cov, ruff
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      # ── Linting ──────────────────────────────────────────────────────────
      - name: Lint with ruff
        run: |
          # E/W/F rules; ignore line-length (E501); --exit-zero = lint failures
          # don't block the build (reported as warnings only)
          ruff check utils/ tests/ --select E,W,F --ignore E501 --exit-zero

      # ── Unit tests ───────────────────────────────────────────────────────
      - name: Run pytest
        env:
          # Prevent Streamlit from attempting to open a browser during tests
          STREAMLIT_SERVER_HEADLESS: "true"
          # Tell optional-dependency guards not to raise ImportError in tests
          NSE_TRACKER_TEST: "true"
        run: |
          pytest tests/ -v --tb=short -m "not network"

      # ── Coverage report (informational only) ─────────────────────────────
      - name: Coverage report
        run: |
          pytest tests/ --cov=utils --cov-report=term-missing -m "not network" -q
        continue-on-error: true
