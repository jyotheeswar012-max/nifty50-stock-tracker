name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      # ── Linting ──────────────────────────────────────────────────────────
      - name: Lint with ruff
        run: |
          # Fail on errors (E) and warnings (W); ignore line-length (E501)
          ruff check utils/ tests/ --select E,W,F --ignore E501 --exit-zero

      # ── Unit tests ───────────────────────────────────────────────────────
      - name: Run pytest
        env:
          # Prevent Streamlit from trying to open a browser during tests
          STREAMLIT_SERVER_HEADLESS: "true"
        run: |
          pytest tests/ -v --tb=short
