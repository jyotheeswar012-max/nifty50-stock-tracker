[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -m "not slow"
markers =
    slow: marks tests as slow / requiring full Streamlit boot (skip in CI with -m "not slow")
    network: marks tests as requiring live internet (skip with -m "not network")
