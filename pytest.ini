[pytest]
testpaths    = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: Pure unit tests (no I/O)
    integration: Tests that mock external APIs
    smoke: Streamlit AppTest smoke tests
