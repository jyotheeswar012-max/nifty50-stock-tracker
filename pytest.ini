[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    slow: marks tests as slow (skipped by default in CI)
    integration: marks tests that require network access
    smoke: marks high-level smoke tests
    unit: marks pure-function unit tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning
