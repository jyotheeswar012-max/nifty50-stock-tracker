[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -m "not slow"
markers =
    slow: marks tests as slow / requiring full Streamlit boot (skip in CI with -m "not slow")
    network: marks tests as requiring live internet (skip with -m "not network")
# exit 0 when no tests are collected (e.g. all filtered by markers)
# removed --exit-zero-on-no-tests because it is not a valid pytest option;
# instead we rely on having real tests in every file.
